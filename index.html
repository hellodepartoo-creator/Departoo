<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departoo — Who's going?</title>
<meta name="description" content="The community for people in Luxembourg who want to travel abroad for festivals, concerts and events — and need a crew to go with.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root{
    --coral:#FF4D17;
    --night:#0D0815;
    --night2:#160F24;
    --cyan:#22D3EE;
    --magenta:#D946EF;
    --gold:#FFB627;
    --green:#10B981;
    --ink:#0D0815;
    --paper:#FBF7F2;
    --muted:#9B92AE;
    --line:rgba(255,255,255,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--night);
    color:#fff;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--coral);color:#fff;}
  a{color:inherit;text-decoration:none;}

  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}

  /* ---------- NAV ---------- */
  nav{
    position:sticky;top:0;z-index:50;
    background:rgba(13,8,21,0.72);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px;}
  .brand{font-family:'Poppins';font-weight:800;font-size:24px;letter-spacing:-0.5px;display:flex;align-items:center;}
  .brand .o1{width:13px;height:13px;border:3px solid #fff;border-radius:50%;display:inline-block;margin:0 1px;transform:translateY(1px);}
  .brand .o2{width:13px;height:13px;background:var(--coral);border-radius:50%;display:inline-block;margin:0 1px;transform:translateY(1px);}
  .nav-cta{font-family:'Poppins';font-weight:600;font-size:14px;background:var(--coral);color:#fff;padding:10px 20px;border-radius:100px;transition:transform .2s ease, box-shadow .2s ease;}
  .nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,77,23,0.4);}

  /* ---------- HERO ---------- */
  header{position:relative;padding:110px 0 90px;text-align:center;overflow:hidden;}
  .glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.5;z-index:0;}
  .glow.g1{width:480px;height:480px;background:var(--coral);top:-160px;left:-120px;opacity:0.35;}
  .glow.g2{width:420px;height:420px;background:var(--magenta);top:40px;right:-140px;opacity:0.25;}
  .glow.g3{width:360px;height:360px;background:var(--cyan);bottom:-180px;left:40%;opacity:0.18;}
  header .wrap{position:relative;z-index:1;}

  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'Poppins';font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--cyan);
    border:1px solid var(--line);border-radius:100px;padding:8px 16px;margin-bottom:30px;
    background:rgba(255,255,255,0.03);
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);}

  h1{
    font-family:'Poppins';font-weight:800;
    font-size:clamp(42px,8vw,86px);
    line-height:0.98;letter-spacing:-2px;
    margin-bottom:26px;
  }
  h1 .you{
    background:linear-gradient(100deg,var(--cyan),var(--magenta));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .lede{font-size:clamp(17px,2.4vw,21px);line-height:1.55;color:#D9D2E6;max-width:580px;margin:0 auto 40px;}
  .hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:'Poppins';font-weight:600;font-size:15px;padding:15px 30px;border-radius:100px;transition:transform .2s ease,box-shadow .2s ease,background .2s ease;display:inline-flex;align-items:center;gap:9px;}
  .btn-primary{background:var(--coral);color:#fff;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,77,23,0.45);}
  .btn-ghost{background:rgba(255,255,255,0.06);color:#fff;border:1px solid var(--line);}
  .btn-ghost:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px);}

  .hero-note{margin-top:26px;font-size:14px;color:var(--muted);}

  /* ---------- MARQUEE ---------- */
  .marquee{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 0;overflow:hidden;background:var(--night2);}
  .marquee-track{display:flex;gap:48px;white-space:nowrap;animation:scroll 26s linear infinite;width:max-content;}
  .marquee span{font-family:'Poppins';font-weight:700;font-size:18px;color:#fff;display:inline-flex;align-items:center;gap:48px;opacity:0.85;}
  .marquee .sep{width:8px;height:8px;border-radius:50%;background:var(--coral);}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* ---------- SECTIONS ---------- */
  section{padding:90px 0;position:relative;}
  .sec-eyebrow{font-family:'Poppins';font-weight:600;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--coral);margin-bottom:14px;}
  .sec-title{font-family:'Poppins';font-weight:800;font-size:clamp(30px,5vw,48px);line-height:1.05;letter-spacing:-1px;margin-bottom:20px;}
  .sec-sub{font-size:18px;line-height:1.6;color:#C9C1D6;max-width:560px;}

  /* WHAT */
  .what{background:var(--night2);}
  .what-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;}
  .what-text p{font-size:18px;line-height:1.7;color:#C9C1D6;margin-bottom:18px;}
  .what-text p strong{color:#fff;font-weight:600;}
  .signature{
    aspect-ratio:1;border-radius:28px;background:radial-gradient(circle at 30% 30%,var(--night2),var(--night));
    border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;position:relative;overflow:hidden;
  }
  .sig-line{font-family:'Poppins';font-weight:800;font-size:clamp(28px,5vw,44px);display:flex;align-items:center;letter-spacing:-1px;}
  .sig-line .so1,.sig-line .so2{width:0.7em;height:0.7em;border-radius:50%;display:inline-block;margin:0 0.04em;transition:all .4s ease;}
  .sig-cap{font-size:14px;color:var(--muted);font-family:'Poppins';letter-spacing:1px;text-transform:uppercase;}
  .sig-dots{display:flex;gap:10px;}
  .sig-dots i{width:10px;height:10px;border-radius:50%;display:block;cursor:pointer;opacity:0.4;transition:opacity .2s;}
  .sig-dots i.on{opacity:1;}

  /* HOW */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:50px;}
  .step{background:var(--night2);border:1px solid var(--line);border-radius:20px;padding:28px 22px;transition:transform .25s ease,border-color .25s ease;}
  .step:hover{transform:translateY(-6px);}
  .step-num{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Poppins';font-weight:800;font-size:20px;color:var(--night);margin-bottom:18px;}
  .step h3{font-family:'Poppins';font-weight:700;font-size:18px;margin-bottom:8px;}
  .step p{font-size:14.5px;line-height:1.55;color:var(--muted);}

  /* EVENTS */
  .events{background:var(--night2);}
  .ev-soon{max-width:620px;margin:0 auto;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px 0;}
  .ev-soon-dots{display:flex;gap:12px;margin-bottom:6px;}
  .ev-soon-dots span{width:14px;height:14px;border-radius:50%;display:block;animation:soonpulse 2s ease-in-out infinite;}
  .ev-soon-dots span:nth-child(2){animation-delay:.3s;}
  .ev-soon-dots span:nth-child(3){animation-delay:.6s;}
  @keyframes soonpulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.3);opacity:1;}}
  .ev-soon-sub{font-size:18px;line-height:1.6;color:#C9C1D6;max-width:480px;}
  .ev-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:44px;}
  .ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .ev-card{border-radius:20px;overflow:hidden;background:var(--night);border:1px solid var(--line);transition:transform .25s ease,box-shadow .25s ease;position:relative;}
  .ev-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.5);}
  .ev-top{height:150px;position:relative;display:flex;align-items:flex-start;justify-content:space-between;padding:18px;overflow:hidden;}
  .ev-logo{font-family:'Poppins';font-weight:800;font-size:15px;display:flex;align-items:center;color:#fff;z-index:2;}
  .ev-logo .eo1,.ev-logo .eo2{width:9px;height:9px;border-radius:50%;display:inline-block;margin:0 1px;}
  .ev-tag{font-family:'Poppins';font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:100px;color:var(--night);z-index:2;}
  .ev-body{padding:20px;}
  .ev-body h3{font-family:'Poppins';font-weight:700;font-size:20px;margin-bottom:5px;}
  .ev-meta{font-size:13.5px;color:var(--muted);margin-bottom:16px;}
  .ev-join{font-family:'Poppins';font-weight:600;font-size:14px;color:var(--cyan);display:inline-flex;align-items:center;gap:6px;}
  .ev-disclaimer{text-align:center;margin-top:34px;font-size:13.5px;color:var(--muted);}

  /* JOIN */
  .join{text-align:center;}
  .join-card{
    background:linear-gradient(135deg,var(--coral),#FF7A3D);
    border-radius:32px;padding:70px 40px;position:relative;overflow:hidden;
  }
  .join-card h2{font-family:'Poppins';font-weight:800;font-size:clamp(30px,5vw,52px);letter-spacing:-1px;line-height:1.02;margin-bottom:18px;}
  .join-card p{font-size:19px;color:rgba(255,255,255,0.92);max-width:480px;margin:0 auto 36px;line-height:1.5;}
  .join-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .btn-white{background:#fff;color:var(--coral);}
  .btn-white:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,0.25);}
  .btn-dark{background:var(--night);color:#fff;}
  .btn-dark:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,0.3);}

  /* FOOTER */
  footer{padding:60px 0 40px;border-top:1px solid var(--line);}
  .foot-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;}
  .foot-brand{font-family:'Poppins';font-weight:800;font-size:22px;display:flex;align-items:center;}
  .foot-brand .fo1{width:11px;height:11px;border:2.5px solid #fff;border-radius:50%;display:inline-block;margin:0 1px;transform:translateY(1px);}
  .foot-brand .fo2{width:11px;height:11px;background:var(--coral);border-radius:50%;display:inline-block;margin:0 1px;transform:translateY(1px);}
  .foot-links{display:flex;gap:24px;font-size:14px;color:var(--muted);}
  .foot-links a:hover{color:#fff;}
  .foot-tag{margin-top:30px;font-size:13px;color:var(--muted);text-align:center;width:100%;}

  /* reveal */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease;}
  .reveal.in{opacity:1;transform:none;}

  @media (max-width:860px){
    .what-grid{grid-template-columns:1fr;gap:40px;}
    .steps{grid-template-columns:repeat(2,1fr);}
    .ev-grid{grid-template-columns:1fr;}
  }
  @media (max-width:520px){
    .steps{grid-template-columns:1fr;}
    header{padding:80px 0 60px;}
    .join-card{padding:50px 24px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
    .reveal{opacity:1;transform:none;}
  }
</style>
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <div class="brand">depart<span class="o1"></span><span class="o2"></span></div>
    <a href="#join" class="nav-cta">Join the community</a>
  </div>
</nav>

<header>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>
  <div class="wrap">
    <div class="eyebrow"><span class="dot"></span> Based in Luxembourg · Going everywhere else</div>
    <h1>Someone out there<br>is <span class="you">going too.</span></h1>
    <p class="lede">Your next best experience is one <strong style="color:#fff;font-weight:700;">"me too"</strong> away. Departoo connects people in Luxembourg travelling to the same festivals, concerts and events abroad — so you never go alone.</p>

      <a href="#join" class="btn btn-primary">Find your crew →</a>
